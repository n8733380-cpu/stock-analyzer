name: 台股每日掃描

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 10:00 UTC = 18:00 台灣時間（T86 發布後 30 分鐘）
  workflow_dispatch:         # 允許手動觸發

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests twstock

      - name: Run daily scan
        env:
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
        run: python daily_scan.py

      - name: Save scan history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan_history.json
          git diff --cached --quiet || git commit -m "chore: update scan history [skip ci]"
          git push
